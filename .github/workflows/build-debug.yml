name: Build Debug APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '要构建的分支 / 标签 / 提交'
        required: true
        default: 'main'
      version:
        description: '可选：覆盖调试构建版本号（如 1.6.9）'
        required: false
        default: ''

concurrency:
  group: build-debug-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make scripts executable
        run: |
          chmod +x scripts/ci/*.sh
          chmod +x manager_app_redesign/manager_app/gradlew

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            ./scripts/ci/resolve_version.sh --version "${{ inputs.version }}" > /tmp/version-info
          else
            current_version="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 | sed 's/^v//')"
            if [ -z "$current_version" ]; then
              current_version="$(sed -n 's/^version=//p' module_template/module.prop | head -n 1)"
            fi
            ./scripts/ci/resolve_version.sh --version "$current_version" > /tmp/version-info
          fi
          cat /tmp/version-info
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < /tmp/version-info

      - name: Build debug APK
        run: |
          ./scripts/ci/build_manager.sh \
            --variant debug \
            --version "${{ steps.resolve.outputs.version }}" \
            --version-code "${{ steps.resolve.outputs.version_code }}"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanmuApiManager-debug-v${{ steps.resolve.outputs.version }}
          path: manager_app_redesign/manager_app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Workflow summary
        run: |
          {
            echo '## Debug 构建完成'
            echo "- 版本：v${{ steps.resolve.outputs.version }}"
            echo '- 产物：DanmuApiManager Debug APK'
            echo '- 获取方式：Artifacts'
          } >> "$GITHUB_STEP_SUMMARY"
