name: Publish Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '要发版的分支 / 标签 / 提交'
        required: true
        default: 'main'
      version:
        description: '可选：手动指定版本号（如 1.6.9）'
        required: false
        default: ''
      bump:
        description: '未指定版本号时的自动递增策略'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: '是否标记为预发布'
        required: true
        default: false
        type: boolean
      draft:
        description: '是否创建草稿发行版'
        required: true
        default: false
        type: boolean

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip rsync curl binutils xz-utils dpkg python3

      - name: Make scripts executable
        run: |
          chmod +x scripts/ci/*.sh
          chmod +x manager_app_redesign/manager_app/gradlew

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            ./scripts/ci/resolve_version.sh --version "${{ inputs.version }}" > /tmp/version-info
          else
            ./scripts/ci/resolve_version.sh --bump "${{ inputs.bump }}" > /tmp/version-info
          fi
          cat /tmp/version-info
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < /tmp/version-info

      - name: Guard existing tag
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ steps.resolve.outputs.tag }}" >/dev/null 2>&1; then
            echo "标签已存在：${{ steps.resolve.outputs.tag }}" >&2
            exit 1
          fi

      - name: Build manager release APK
        run: |
          ./scripts/ci/build_manager.sh \
            --variant release \
            --version "${{ steps.resolve.outputs.version }}" \
            --version-code "${{ steps.resolve.outputs.version_code }}"

      - name: Build release modules
        run: |
          ./scripts/ci/build_modules.sh \
            --variant both \
            --version "${{ steps.resolve.outputs.version }}" \
            --version-code "${{ steps.resolve.outputs.version_code }}" \
            --manager-apk manager_app_redesign/manager_app/app/build/outputs/apk/release/app-release.apk

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p build/ci/out
          cp manager_app_redesign/manager_app/app/build/outputs/apk/release/app-release.apk \
            "build/ci/out/DanmuApiManager-v${{ steps.resolve.outputs.version }}-release.apk"
          (
            cd build/ci/out
            sha256sum ./* > SHA256SUMS.txt
          )

      - name: Generate release notes
        run: |
          ./scripts/ci/generate_release_notes.sh \
            --version "${{ steps.resolve.outputs.version }}" \
            --tag "${{ steps.resolve.outputs.tag }}" \
            --previous-tag "${{ steps.resolve.outputs.previous_tag }}" \
            --repo "${{ github.repository }}" \
            --output build/ci/out/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: Danmu API Server ${{ steps.resolve.outputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          body_path: build/ci/out/release-notes.md
          files: |
            build/ci/out/*.zip
            build/ci/out/*-release.apk
            build/ci/out/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Workflow summary
        run: |
          {
            echo '## Release 已发布'
            echo "- 标签：${{ steps.resolve.outputs.tag }}"
            echo "- 上一版本：${{ steps.resolve.outputs.previous_tag || '无' }}"
            echo '- 已上传：管理器 Release APK、No-Node 模块、Node 模块、SHA256SUMS.txt'
            echo '- 更新日志：已根据上一个版本到当前版本之间的提交自动生成'
          } >> "$GITHUB_STEP_SUMMARY"
